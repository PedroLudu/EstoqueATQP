<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Estoque 3D</title>
</head>

<body>

  <h2>Adicionar / Editar</h2>

  <input id="rua" placeholder="Rua">
  <input id="coluna" placeholder="Coluna">
  <input id="altura" placeholder="Altura">
  <input id="item" placeholder="Item">

  <button onclick="salvar()">
    Salvar
  </button>

  <h2>Lista</h2>

  <h2>Visualização 3D</h2>

  <div id="matriz"></div>

  <script>

    const API_URL =
      "https://script.google.com/macros/s/AKfycbzMACjgdxjUfhjtmJiyqTGOZzaoNDM2LWBieG60z5qPtm5u2x7yjW2sNTP1tPzqW8FV/exec";

    function carregar() {

      const script =
        document.createElement("script");

      script.src =
        API_URL + "?callback=mostrar";

      document.body.appendChild(script);
    }

    function mostrar(dados) {

  const matriz =
    document.getElementById("matriz");

  if (!matriz) return;

  matriz.innerHTML = "";

  // alturas
  for (let altura = 1; altura <= 3; altura++) {

    const camada =
      document.createElement("div");

    camada.style.marginBottom = "30px";

    const titulo =
      document.createElement("h3");

    titulo.textContent =
      `Altura ${altura}`;

    camada.appendChild(titulo);

    const tabela =
      document.createElement("table");

    tabela.border = "1";
    tabela.cellPadding = "10";

    // CABEÇALHO
    const head =
      document.createElement("tr");

    const vazio =
      document.createElement("th");

    vazio.textContent = "Rua";

    head.appendChild(vazio);

    for (let coluna = 1; coluna <= 4; coluna++) {

      const th =
        document.createElement("th");

      th.textContent = coluna;

      head.appendChild(th);
    }

    tabela.appendChild(head);

    // RUAS
    ["A", "B", "C", "D"].forEach(rua => {

      const tr =
        document.createElement("tr");

      const nomeRua =
        document.createElement("th");

      nomeRua.textContent = rua;

      tr.appendChild(nomeRua);

      // COLUNAS
      for (let coluna = 1; coluna <= 4; coluna++) {

        const td =
          document.createElement("td");

        td.style.width = "100px";
        td.style.height = "70px";
        td.style.textAlign = "center";
        td.style.verticalAlign = "middle";

        // regra física
        if (coluna === 1 && altura > 2) {

          td.style.backgroundColor = "#444";

          td.style.color = "white";

          td.textContent = "X";

          tr.appendChild(td);

          continue;
        }

        // procura item
        const itemEncontrado = dados.find(d =>

          d.Rua === rua &&
          Number(d.Coluna) === coluna &&
          Number(d.Altura) === altura
        );

        if (itemEncontrado) {

          td.style.backgroundColor = "#90ee90";

          td.innerHTML =
            `<strong>📦</strong><br>${itemEncontrado.Item}`;

        } else {

          td.style.backgroundColor = "#f0f0f0";

          td.textContent = "⬜";
        }

        tr.appendChild(td);
      }

      tabela.appendChild(tr);
    });

    camada.appendChild(tabela);

    matriz.appendChild(camada);
  }
}

    function salvar() {

      let rua =
  document.getElementById("rua").value
    .trim()
    .toUpperCase();

// validação
if (!["A", "B", "C", "D"].includes(rua)) {

  alert("Rua inválida! Use apenas A, B, C ou D.");

  return;
}

rua = encodeURIComponent(rua);

      const coluna =
        encodeURIComponent(
          document.getElementById("coluna").value
        );

      const altura =
        encodeURIComponent(
          document.getElementById("altura").value
        );

      const item =
        encodeURIComponent(
          document.getElementById("item").value
        );

      const colunaNum = parseInt(coluna);
      const alturaNum = parseInt(altura);

      // validações numéricas
      if (isNaN(colunaNum) || isNaN(alturaNum)) {

      alert("Coluna e Altura devem ser números.");

      return;
      }

      // primeira coluna -> máximo 2
      if (colunaNum === 1 && alturaNum > 2) {

      alert(
      "A coluna 1 permite altura máxima de 2."
      );

      return;
      }

      // demais colunas -> máximo 3
      if (colunaNum > 1 && alturaNum > 3) {

      alert(
      "As demais colunas permitem altura máxima de 3."
      );

      return;
      }
      // limite de colunas
      if (colunaNum < 1 || colunaNum > 4) {

      alert(
      "As colunas devem estar entre 1 e 4."
      );

      return;
      }
      const script =
        document.createElement("script");

      script.src =
        `${API_URL}?rua=${rua}&coluna=${coluna}&altura=${altura}&item=${item}&callback=salvo`;

      document.body.appendChild(script);
    }

    function salvo(resposta) {

      console.log(resposta);

      carregar();

    }

    document.addEventListener(
      "DOMContentLoaded",
      () => {

        carregar();

        setInterval(carregar, 3000);

      }
    );

  </script>

</body>

</html>
