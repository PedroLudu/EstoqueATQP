<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Estoque 3D</title>
</head>

<body>

  <h2>Adicionar / Editar</h2>

  <input id="rua" placeholder="Rua">
  <input id="coluna" placeholder="Coluna">
  <input id="altura" placeholder="Altura">
  <input id="item" placeholder="Item">

  <button onclick="salvar()">
    Salvar
  </button>

  <h2>Lista</h2>

  <ul id="lista"></ul>

  <script>

    const API_URL =
      "https://script.google.com/macros/s/AKfycbzMACjgdxjUfhjtmJiyqTGOZzaoNDM2LWBieG60z5qPtm5u2x7yjW2sNTP1tPzqW8FV/exec";

    function carregar() {

      const script =
        document.createElement("script");

      script.src =
        API_URL + "?callback=mostrar";

      document.body.appendChild(script);
    }

    function mostrar(dados) {

      const lista =
        document.getElementById("lista");

      if (!lista) return;

      lista.innerHTML = "";

      dados.forEach(d => {

        const li =
          document.createElement("li");

        li.textContent =
          `${d.Rua}-${d.Coluna}-${d.Altura} → ${d.Item}`;

        lista.appendChild(li);

      });

    }

    function salvar() {

      let rua =
  document.getElementById("rua").value
    .trim()
    .toUpperCase();

// validação
if (!["A", "B", "C", "D"].includes(rua)) {

  alert("Rua inválida! Use apenas A, B, C ou D.");

  return;
}

rua = encodeURIComponent(rua);

      const coluna =
        encodeURIComponent(
          document.getElementById("coluna").value
        );

      const altura =
        encodeURIComponent(
          document.getElementById("altura").value
        );

      const item =
        encodeURIComponent(
          document.getElementById("item").value
        );

      const colunaNum = parseInt(coluna);
      const alturaNum = parseInt(altura);

      // validações numéricas
      if (isNaN(colunaNum) || isNaN(alturaNum)) {

      alert("Coluna e Altura devem ser números.");

      return;
      }

      // primeira coluna -> máximo 2
      if (colunaNum === 1 && alturaNum > 2) {

      alert(
      "A coluna 1 permite altura máxima de 2."
      );

      return;
      }

      // demais colunas -> máximo 3
      if (colunaNum > 1 && alturaNum > 3) {

      alert(
      "As demais colunas permitem altura máxima de 3."
      );

      return;
      }
      // limite de colunas
      if (colunaNum < 1 || colunaNum > 4) {

      alert(
      "As colunas devem estar entre 1 e 4."
      );

      return;
      }
      const script =
        document.createElement("script");

      script.src =
        `${API_URL}?rua=${rua}&coluna=${coluna}&altura=${altura}&item=${item}&callback=salvo`;

      document.body.appendChild(script);
    }

    function salvo(resposta) {

      console.log(resposta);

      carregar();

    }

    document.addEventListener(
      "DOMContentLoaded",
      () => {

        carregar();

        setInterval(carregar, 3000);

      }
    );

  </script>

</body>

</html>
