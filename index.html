<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Estoque 3D</title>
</head>
<body>
<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbzMACjgdxjUfhjtmJiyqTGOZzaoNDM2LWBieG60z5qPtm5u2x7yjW2sNTP1tPzqW8FV/exec";

function carregar() {

  const script = document.createElement("script");

  script.src =
    API_URL + "?callback=mostrar";

  document.body.appendChild(script);
}

function mostrar(dados) {

  const lista =
    document.getElementById("lista");

  if (!lista) {
    console.log("Lista ainda não carregada");
    return;
  }

  lista.innerHTML = "";

  dados.forEach(d => {

    const li =
      document.createElement("li");

    li.textContent =
      `${d.Rua}-${d.Coluna}-${d.Altura} → ${d.Item}`;

    lista.appendChild(li);
  });
}}

function salvar() {

  const rua =
    encodeURIComponent(
      document.getElementById("rua").value
    );

  const coluna =
    encodeURIComponent(
      document.getElementById("coluna").value
    );

  const altura =
    encodeURIComponent(
      document.getElementById("altura").value
    );

  const item =
    encodeURIComponent(
      document.getElementById("item").value
    );

  const script =
    document.createElement("script");

  script.src =
    `${API_URL}?rua=${rua}&coluna=${coluna}&altura=${altura}&item=${item}&callback=salvo`;

  document.body.appendChild(script);
}

function salvo(resposta) {

  console.log(resposta);

  carregar();
}

document.addEventListener("DOMContentLoaded", () => {

  carregar();

  setInterval(carregar, 3000);

});
</script>
