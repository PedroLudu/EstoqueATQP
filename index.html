<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Estoque 3D</title>

  <style>

    body {

      margin: 0;

      width: 100vw;

      height: 100vh;

      overflow: hidden;

      font-family: Arial, sans-serif;

      background: #f0f0f0;
    }

    #canvas3d {

      position: fixed;

      top: 0;

      left: 0;

      width: 100vw;

      height: 100vh;
    }

    #painel {

      position: fixed;

      top: 10px;

      left: 10px;

      z-index: 10;

      background: rgba(255,255,255,0.95);

      padding: 15px;

      border-radius: 10px;

      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    input {

      display: block;

      margin-bottom: 10px;

      padding: 8px;

      width: 200px;
    }

    button {

      padding: 10px;

      width: 100%;

      cursor: pointer;
    }
    #infoBox {

  position: fixed;

  bottom: 20px;

  left: 50%;

  transform: translateX(-50%);

  background: rgba(0,0,0,0.8);

  color: white;

  padding: 12px 18px;

  border-radius: 20px;

  z-index: 20;

  font-size: 16px;

  display: none;
}

  </style>

</head>

<body>

  

  <div id="canvas3d"></div>
  <div id="infoBox"></div>

  <script type="module">

    import * as THREE from
    'https://esm.sh/three@0.160.0';

    import { OrbitControls } from
    'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls';

    // =========================
    // VARIAVEIS GLOBAIS
    // =========================

    

    let tempoPisca = 0;
    const cubos = [];
    const labels = [];

    // =========================
    // API
    // =========================

    const API_URL =
      "https://script.google.com/macros/s/AKfycbzMACjgdxjUfhjtmJiyqTGOZzaoNDM2LWBieG60z5qPtm5u2x7yjW2sNTP1tPzqW8FV/exec";

    // =========================
    // CENA
    // =========================

    const scene =
      new THREE.Scene();

    scene.background =
      new THREE.Color(0x2e2e3b);

    // =========================
    // CAMERA
    // =========================

    const camera =
      new THREE.PerspectiveCamera(

        75,

        window.innerWidth /
        window.innerHeight,

        0.1,

        1000
      );

    camera.position.set(
      10,
      8,
      14
    );

    // =========================
    // RENDERER
    // =========================

    const renderer =
      new THREE.WebGLRenderer({

        antialias: true

      });

    renderer.setSize(
      window.innerWidth,
      window.innerHeight
    );

    renderer.setPixelRatio(
      window.devicePixelRatio
    );

    document
      .getElementById("canvas3d")
      .appendChild(renderer.domElement);

    // =========================
    // CONTROLES
    // =========================

    const controls =
      new OrbitControls(

        camera,

        renderer.domElement
      );

    controls.enableDamping = true;

    controls.dampingFactor = 0.05;

    controls.minDistance = 5;

    controls.maxDistance = 40;

    // =========================
    // LUZES
    // =========================

    const luzDirecional =
      new THREE.DirectionalLight(
        0xffffff,
        2
      );

    luzDirecional.position.set(
      10,
      20,
      10
    );

    scene.add(luzDirecional);

    const luzAmbiente =
      new THREE.AmbientLight(
        0xffffff,
        1
      );

    scene.add(luzAmbiente);

    // =========================
    // LIMPAR CENA
    // =========================

   function limparCena() {

  cubos.forEach(objeto => {

    scene.remove(objeto);

  });

  labels.forEach(objeto => {

    scene.remove(objeto);

  });

  cubos.length = 0;
  labels.length = 0;
}


    // =========================
    // MOSTRAR MATRIZ
    // =========================

    function criarTexto(texto) {

  const canvas =
    document.createElement("canvas");

  const ctx =
    canvas.getContext("2d");

  canvas.width = 256;
  canvas.height = 128;

  ctx.fillStyle = "white";

  ctx.font = "Bold 48px Arial";

  ctx.textAlign = "center";

  ctx.textBaseline = "middle";

  ctx.fillText(
    texto,
    canvas.width / 2,
    canvas.height / 2
  );

  const texture =
    new THREE.CanvasTexture(canvas);

  const material =
    new THREE.SpriteMaterial({

      map: texture,

      transparent: true

    });

  const sprite =
    new THREE.Sprite(material);

  sprite.scale.set(
    1.8,
    0.9,
    1
  );

  return sprite;
}

    window.mostrar = function(dados) {

      limparCena();

      const ruas =
        ["A","B","C","D"];

        // =========================
// LABELS DAS RUAS
// =========================

ruas.forEach((rua, z) => {

  const labelRua =
    criarTexto(`Rua ${rua}`);

  labelRua.position.set(
    -1.5,
    0.5,
    -z * 2
  );

  scene.add(labelRua);

  labels.push(labelRua);
});

// =========================
// LABELS DAS COLUNAS
// =========================

for (
  let coluna = 1;
  coluna <= 4;
  coluna++
) {

  const labelColuna =
    criarTexto(`C${coluna}`);

  labelColuna.position.set(
    coluna * 2,
    0.5,
    2
  );

  scene.add(labelColuna);

  labels.push(labelColuna);
}

      ruas.forEach((rua, z) => {

        for (
          let coluna = 1;
          coluna <= 4;
          coluna++
        ) {

          const alturaMax =
            coluna === 1 ? 2 : 3;

          for (
            let altura = 1;
            altura <= alturaMax;
            altura++
          ) {

            const item =
              dados.find(d =>

                d.Rua === rua &&
                Number(d.Coluna) === coluna &&
                Number(d.Altura) === altura
              );

            const geometry =
              new THREE.BoxGeometry(
                1,
                1,
                1
              );

           const valorItem =
  item?.Item != null
    ? String(item.Item).trim()
    : "";

const possuiItem =
  valorItem !== "";

const material =
  new THREE.MeshStandardMaterial({

    color:
      possuiItem
      ? 0x00aa00
      : 0x888888,

    transparent: true,

    opacity:
      possuiItem
      ? 1
      : 0.5

  });

            const cube =
              new THREE.Mesh(
                geometry,
                material


              );

              //data
              cube.userData = {

             rua,
             coluna,
             altura,

              item: valorItem

            };

            // POSIÇÃO

            cube.position.x =
              coluna * 2;

            cube.position.y =
              altura * 1.5;

            cube.position.z =
              -z * 2;

            scene.add(cube);
            cubos.push(cube);
            // restaura seleção após atualização

if (

  posicaoSelecionada &&

  posicaoSelecionada.rua === rua &&

  Number(posicaoSelecionada.coluna) === coluna &&

  Number(posicaoSelecionada.altura) === altura

) {

  cuboSelecionado = cube;
}
          }
        }
      });
    }

    // =========================
    // CARREGAR
    // =========================

    function carregar() {

      const script =
        document.createElement("script");

      script.src =
        API_URL +
        "?callback=mostrar";

      document.body.appendChild(script);
    }

    function salvarDireto(
  rua,
  coluna,
  altura,
  item
) {

  const script =
    document.createElement("script");

  script.src =

    `${API_URL}

    ?rua=${encodeURIComponent(rua)}

    &coluna=${encodeURIComponent(coluna)}

    &altura=${encodeURIComponent(altura)}

    &item=${encodeURIComponent(item)}

    &callback=salvo`

    .replace(/\s/g, "");

  document.body.appendChild(script);
}

    // =========================
    // SALVAR
    // =========================

    window.salvar = function() {

      let rua =
        document
          .getElementById("rua")
          .value
          .trim()
          .toUpperCase();

      if (
        !["A","B","C","D"]
        .includes(rua)
      ) {

        alert(
          "Rua inválida!"
        );

        return;
      }

      const coluna =
        document
          .getElementById("coluna")
          .value;

      const altura =
        document
          .getElementById("altura")
          .value;

      const item =
        document
          .getElementById("item")
          .value;

      const colunaNum =
        parseInt(coluna);

      const alturaNum =
        parseInt(altura);

      // validações

      if (
        colunaNum < 1 ||
        colunaNum > 4
      ) {

        alert(
          "Colunas devem ser 1-4"
        );

        return;
      }

      if (
        colunaNum === 1 &&
        alturaNum > 2
      ) {

        alert(
          "Coluna 1 suporta altura máxima 2"
        );

        return;
      }

      if (
        colunaNum > 1 &&
        alturaNum > 3
      ) {

        alert(
          "Altura máxima é 3"
        );

        return;
      }

      const script =
        document.createElement("script");

      script.src =
        `${API_URL}?rua=${encodeURIComponent(rua)}&coluna=${encodeURIComponent(coluna)}&altura=${encodeURIComponent(altura)}&item=${encodeURIComponent(item)}&callback=salvo`;

      document.body.appendChild(script);
    }

    window.salvo = function() {

      carregar();

    }

    // =========================
    // LOOP
    // =========================
    const raycaster =
  new THREE.Raycaster();

const mouse =
  new THREE.Vector2();

let cuboSelecionado = null;
let posicaoSelecionada = null;

let cuboAtual = null;
// =========================
// CLICK / SELEÇÃO
// =========================

window.addEventListener(
  "click",
  (event) => {

    mouse.x =
      (event.clientX / window.innerWidth)
      * 2 - 1;

    mouse.y =
      -(event.clientY / window.innerHeight)
      * 2 + 1;

    raycaster.setFromCamera(
      mouse,
      camera
    );

    const intersects =
      raycaster.intersectObjects(
  cubos
);

    if (
      intersects.length > 0
    ) {

      const objeto =
        intersects[0].object;


      // restaura cubo anterior
if (
  cuboSelecionado &&
  cuboSelecionado !== objeto
) {

  cuboSelecionado.material.color.set(

    cuboSelecionado.userData.item !== ""
    ? 0x00aa00
    : 0xbbbbbb

  );
}

// novo selecionado
cuboSelecionado = objeto;
  
  posicaoSelecionada = {

  rua: objeto.userData.rua,

  coluna: objeto.userData.coluna,

  altura: objeto.userData.altura

};

      

      // INFO BOX

      if (
  objeto.userData
) {

  const info =
    objeto.userData;

  const box =
    document.getElementById(
      "infoBox"
    );

  box.style.display =
    "block";

  box.innerHTML = `

    <div style="min-width:220px">

      <div style="margin-bottom:10px">

        <strong>
          Rua ${info.rua}
        </strong>

        -

        Coluna ${info.coluna}

        -

        Altura ${info.altura}

      </div>
    <input
      id="popupItem"

  value="${info.item}"

  placeholder="Item"

  style="
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border:none;
    border-radius:6px;
    box-sizing:border-box;
  "
>

      <button

        id="btnSalvarPopup"

        style="
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  box-sizing:border-box;
"
      >

        Salvar

      </button>

      <button

        id="btnRemoverPopup"

        style="
          width:100%;
          padding:10px;
          border:none;
          border-radius:6px;
          cursor:pointer;
          background:#aa3333;
          color:white;
        "
      >

        Remover Item

      </button>

    </div>
  `;

  // =========================
  // EVENTOS DO POPUP
  // =========================

  document
    .getElementById("btnSalvarPopup")
    .onclick = () => {

      const novoItem =
        document
          .getElementById("popupItem")
          .value;

      salvarDireto(

        info.rua,
        info.coluna,
        info.altura,
        novoItem

      );
    };

  document
    .getElementById("btnRemoverPopup")
    .onclick = () => {

      salvarDireto(

        info.rua,
        info.coluna,
        info.altura,
        ""

      );
    };
}
}
}
);
// =========================
// HOVER
// =========================

window.addEventListener(
  "mousemove",
  (event) => {

    mouse.x =
      (event.clientX / window.innerWidth)
      * 2 - 1;

    mouse.y =
      -(event.clientY / window.innerHeight)
      * 2 + 1;

    raycaster.setFromCamera(
      mouse,
      camera
    );

    const intersects =
      raycaster.intersectObjects(
        cubos
      );

    // restaura hover antigo
    if (
      cuboAtual &&
      cuboAtual !== cuboSelecionado
    ) {

      if (
        cuboAtual.userData.item !== ""
      ) {

        cuboAtual.material.color.set(
          0x00aa00
        );

        cuboAtual.material.opacity = 1;

      } else {

        cuboAtual.material.color.set(
          0x888888
        );

        cuboAtual.material.opacity = 0.5;
      }
    }

    cuboAtual = null;

    // novo hover
    if (
      intersects.length > 0
    ) {

      const objeto =
        intersects[0].object;

      // ignora selecionado
      if (
        objeto !== cuboSelecionado
      ) {

        cuboAtual = objeto;

        objeto.material.color.set(
          0xffff00
        );

        objeto.material.opacity = 1;
      }
    }
  }
);

    function animar() {

      requestAnimationFrame(animar);

      controls.update();

      

    // =========================
    // PISCAR CONTÍNUO
    // =========================

tempoPisca += 0.08;

if (
  cuboSelecionado
) {

  const intensidade =
    (Math.sin(tempoPisca) + 1) / 2;

  if (
    intensidade > 0.5
  ) {

    cuboSelecionado.material.color.set(
      0xffffff
    );

  } else {

    cuboSelecionado.material.color.set(

      cuboSelecionado.userData.item !== ""
      ? 0x00aa00
      : 0x888888

    );
  }
}

      renderer.render(
        scene,
        camera
      );
    }

    animar();

    // =========================
    // RESIZE
    // =========================

    window.addEventListener(
      "resize",
      () => {

        camera.aspect =
          window.innerWidth /
          window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
          window.innerWidth,
          window.innerHeight
        );
      }
    );

    // =========================
    // START
    // =========================

    carregar();

    setInterval(() => {

  if (!document.hidden) {

    carregar();

  }

}, 3000);
  </script>

</body>

</html>
