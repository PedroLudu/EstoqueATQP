<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Estoque 3D</title>

  <style>

    body {

      margin: 0;

      width: 100vw;

      height: 100vh;

      overflow: hidden;

      font-family: Arial, sans-serif;

      background: #f0f0f0;
    }

    #canvas3d {

      position: fixed;

      top: 0;

      left: 0;

      width: 100vw;

      height: 100vh;
    }

    #painel {

      position: fixed;

      top: 10px;

      left: 10px;

      z-index: 10;

      background: rgba(255,255,255,0.95);

      padding: 15px;

      border-radius: 10px;

      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    input {

      display: block;

      margin-bottom: 10px;

      padding: 8px;

      width: 200px;
    }

    button {

      padding: 10px;

      width: 100%;

      cursor: pointer;
    }
    #infoBox {

  position: fixed;

  bottom: 20px;

  left: 50%;

  transform: translateX(-50%);

  background: rgba(0,0,0,0.8);

  color: white;

  padding: 12px 18px;

  border-radius: 10px;

  z-index: 20;

  font-size: 16px;

  display: none;
}

  </style>

</head>

<body>

  <div id="painel">

    <h2>Estoque 3D</h2>

    <input
      id="rua"
      placeholder="Rua (A-D)"
    >

    <input
      id="coluna"
      type="number"
      placeholder="Coluna"
    >

    <input
      id="altura"
      type="number"
      placeholder="Altura"
    >

    <input
      id="item"
      placeholder="Item"
    >

    <button onclick="salvar()">
      Salvar
    </button>

  </div>

  <div id="canvas3d"></div>
  <div id="infoBox"></div>

  <script type="module">

    import * as THREE from
    'https://esm.sh/three@0.160.0';

    import { OrbitControls } from
    'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls';

    // =========================
    // API
    // =========================

    const API_URL =
      "https://script.google.com/macros/s/AKfycbzMACjgdxjUfhjtmJiyqTGOZzaoNDM2LWBieG60z5qPtm5u2x7yjW2sNTP1tPzqW8FV/exec";

    // =========================
    // CENA
    // =========================

    const scene =
      new THREE.Scene();

    scene.background =
      new THREE.Color(0xf0f0f0);

    // =========================
    // CAMERA
    // =========================

    const camera =
      new THREE.PerspectiveCamera(

        75,

        window.innerWidth /
        window.innerHeight,

        0.1,

        1000
      );

    camera.position.set(
      10,
      8,
      14
    );

    // =========================
    // RENDERER
    // =========================

    const renderer =
      new THREE.WebGLRenderer({

        antialias: true

      });

    renderer.setSize(
      window.innerWidth,
      window.innerHeight
    );

    renderer.setPixelRatio(
      window.devicePixelRatio
    );

    document
      .getElementById("canvas3d")
      .appendChild(renderer.domElement);

    // =========================
    // CONTROLES
    // =========================

    const controls =
      new OrbitControls(

        camera,

        renderer.domElement
      );

    controls.enableDamping = true;

    controls.dampingFactor = 0.05;

    controls.minDistance = 5;

    controls.maxDistance = 40;

    // =========================
    // LUZES
    // =========================

    const luzDirecional =
      new THREE.DirectionalLight(
        0xffffff,
        2
      );

    luzDirecional.position.set(
      10,
      20,
      10
    );

    scene.add(luzDirecional);

    const luzAmbiente =
      new THREE.AmbientLight(
        0xffffff,
        1
      );

    scene.add(luzAmbiente);

    // =========================
    // LIMPAR CENA
    // =========================

    function limparCena() {

      while (
        scene.children.length > 2
      ) {

        scene.remove(
          scene.children[2]
        );
      }
    }

    // =========================
    // MOSTRAR MATRIZ
    // =========================

    window.mostrar = function(dados) {

      limparCena();

      const ruas =
        ["A","B","C","D"];

      ruas.forEach((rua, z) => {

        for (
          let coluna = 1;
          coluna <= 4;
          coluna++
        ) {

          const alturaMax =
            coluna === 1 ? 2 : 3;

          for (
            let altura = 1;
            altura <= alturaMax;
            altura++
          ) {

            const item =
              dados.find(d =>

                d.Rua === rua &&
                Number(d.Coluna) === coluna &&
                Number(d.Altura) === altura
              );

            const geometry =
              new THREE.BoxGeometry(
                1,
                1,
                1
              );

            const material =
              new THREE.MeshStandardMaterial({

                color:
                  item
                  ? 0x00aa00
                  : 0xbbbbbb

              });

            const cube =
              new THREE.Mesh(
                geometry,
                material


              );

              //data
              cube.userData = {

             rua,
             coluna,
             altura,

              item:
             item
            ? item.Item
           : "Vazio"

            };

            // POSIÇÃO

            cube.position.x =
              coluna * 2;

            cube.position.y =
              altura * 1.5;

            cube.position.z =
              z * 2;

            scene.add(cube);
          }
        }
      });
    }

    // =========================
    // CARREGAR
    // =========================

    function carregar() {

      const script =
        document.createElement("script");

      script.src =
        API_URL +
        "?callback=mostrar";

      document.body.appendChild(script);
    }

    // =========================
    // SALVAR
    // =========================

    window.salvar = function() {

      let rua =
        document
          .getElementById("rua")
          .value
          .trim()
          .toUpperCase();

      if (
        !["A","B","C","D"]
        .includes(rua)
      ) {

        alert(
          "Rua inválida!"
        );

        return;
      }

      const coluna =
        document
          .getElementById("coluna")
          .value;

      const altura =
        document
          .getElementById("altura")
          .value;

      const item =
        document
          .getElementById("item")
          .value;

      const colunaNum =
        parseInt(coluna);

      const alturaNum =
        parseInt(altura);

      // validações

      if (
        colunaNum < 1 ||
        colunaNum > 4
      ) {

        alert(
          "Colunas devem ser 1-4"
        );

        return;
      }

      if (
        colunaNum === 1 &&
        alturaNum > 2
      ) {

        alert(
          "Coluna 1 suporta altura máxima 2"
        );

        return;
      }

      if (
        colunaNum > 1 &&
        alturaNum > 3
      ) {

        alert(
          "Altura máxima é 3"
        );

        return;
      }

      const script =
        document.createElement("script");

      script.src =
        `${API_URL}?rua=${encodeURIComponent(rua)}&coluna=${encodeURIComponent(coluna)}&altura=${encodeURIComponent(altura)}&item=${encodeURIComponent(item)}&callback=salvo`;

      document.body.appendChild(script);
    }

    window.salvo = function() {

      carregar();

    }

    // =========================
    // LOOP
    // =========================
    const raycaster =
  new THREE.Raycaster();

const mouse =
  new THREE.Vector2();

let cuboSelecionado = null;
let cuboAtual = null;
// =========================
// CLICK / SELEÇÃO
// =========================

window.addEventListener(
  "click",
  (event) => {

    mouse.x =
      (event.clientX / window.innerWidth)
      * 2 - 1;

    mouse.y =
      -(event.clientY / window.innerHeight)
      * 2 + 1;

    raycaster.setFromCamera(
      mouse,
      camera
    );

    const intersects =
      raycaster.intersectObjects(
        scene.children
      );

    if (
      intersects.length > 0
    ) {

      const objeto =
        intersects[0].object;

      // remove borda anterior
      if (
        cuboSelecionado &&
        cuboSelecionado.userData.borda
      ) {

        cuboSelecionado.remove(
          cuboSelecionado.userData.borda
        );
      }

      cuboSelecionado =
        objeto;

      // cria borda brilhante
      const edges =
        new THREE.EdgesGeometry(
          objeto.geometry
        );

      const linha =
        new THREE.LineSegments(

          edges,

          new THREE.LineBasicMaterial({

            color: 0xffff00

          })
        );

      linha.scale.set(
        1.05,
        1.05,
        1.05
      );

      objeto.add(linha);

      objeto.userData.borda =
        linha;

      // INFO BOX

      if (
        objeto.userData
      ) {

        const info =
          objeto.userData;

        const box =
          document.getElementById(
            "infoBox"
          );

        box.style.display =
          "block";

        box.innerHTML = `

          <strong>
            ${info.item}
          </strong>

          <br><br>

          Rua:
          ${info.rua}

          <br>

          Coluna:
          ${info.coluna}

          <br>

          Altura:
          ${info.altura}

        `;
      }
    }
  }
);
    // =========================
// HOVER
// =========================

window.addEventListener(
  "mousemove",
  (event) => {

    mouse.x =
      (event.clientX / window.innerWidth)
      * 2 - 1;

    mouse.y =
      -(event.clientY / window.innerHeight)
      * 2 + 1;

    raycaster.setFromCamera(
      mouse,
      camera
    );

    const intersects =
      raycaster.intersectObjects(
        scene.children
      );

    // restaura cor anterior
    if (cuboAtual) {

      cuboAtual.material.color.set(

        cuboAtual.userData.item !== "Vazio"
        ? 0x00aa00
        : 0xbbbbbb

      );

      cuboAtual = null;
    }

    // novo hover
    if (
      intersects.length > 0
    ) {

      const objeto =
        intersects[0].object;

      if (
        objeto.material
      ) {

        cuboAtual = objeto;

        objeto.material.color.set(
          0xffff00
        );
      }
    }
  }
);

    function animar() {

      requestAnimationFrame(animar);

      controls.update();

      renderer.render(
        scene,
        camera
      );
    }

    animar();

    // =========================
    // RESIZE
    // =========================

    window.addEventListener(
      "resize",
      () => {

        camera.aspect =
          window.innerWidth /
          window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
          window.innerWidth,
          window.innerHeight
        );
      }
    );

    // =========================
    // START
    // =========================

    carregar();

    setInterval(
      carregar,
      3000
    );

  </script>

</body>

</html>
